name: Build APK with Buildozer

on:  
  push:  
    branches: [main]  
  pull_request:  
    branches: [main]  

jobs:  
  build:  
    runs-on: ubuntu-latest  

    steps:  
      - name: 🔹 Clonar el Repositorio  
        uses: actions/checkout@v3  

      - name: 🔹 Configurar Python  
        uses: actions/setup-python@v4  
        with:  
          python-version: "3.10"  

      - name: 🔹 Instalar Dependencias del Sistema  
        run: |  
          sudo apt update  
          sudo apt install -y zip unzip openjdk-17-jdk  
          pip install --upgrade pip setuptools wheel  

      - name: ✅ Instalar Buildozer y Dependencias  
        run: |  
          pip install --user buildozer Cython  
          echo "$HOME/.local/bin" >> $GITHUB_PATH  

      - name: ✅ Instalar Android SDK Manualmente  
        run: |  
          mkdir -p $HOME/.buildozer/android/platform  
          cd $HOME/.buildozer/android/platform  
          wget https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip  
          unzip commandlinetools-linux-10406996_latest.zip  
          mkdir -p android-sdk/cmdline-tools/latest  
          mv cmdline-tools/* android-sdk/cmdline-tools/latest/  
          export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk  
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH  
          yes | sdkmanager --licenses  
          sdkmanager --install "platform-tools" "platforms;android-30" "build-tools;30.0.3"  

      - name: 🚀 Compilar APK con Buildozer  
        run: |  
          buildozer -v android debug  

      - name: 📦 Guardar APK como Artefacto  
        uses: actions/upload-artifact@v3  
        with:  
          name: UrbanGo-APK  
          path: bin/*.apk  
