name: Build Kivy App

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🛑 Checkout del repositorio
        uses: actions/checkout@v3

      - name: ✅ Configurar Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.10'

      - name: 🏗️ Instalar dependencias de Buildozer
        run: |
          sudo apt update
          sudo apt install -y python3-pip build-essential git zip unzip openjdk-17-jdk
          pip install --upgrade pip
          pip install buildozer

      - name: ✅ Instalar Android SDK Manualmente
        run: |
          mkdir -p $HOME/.buildozer/android/platform  
          cd $HOME/.buildozer/android/platform  
          
          # Descargar herramientas de línea de comandos de Android
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip  
          unzip commandlinetools-linux-11076708_latest.zip -d android-sdk  
          
          # Mover herramientas al directorio correcto
          mkdir -p android-sdk/cmdline-tools/latest  
          mv android-sdk/cmdline-tools/* android-sdk/cmdline-tools/latest/  
          
          # Configurar variables de entorno
          export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk  
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH  
          
          # Aceptar licencias y descargar componentes necesarios
          yes | sdkmanager --licenses  
          sdkmanager --install "platform-tools" "platforms;android-30" "build-tools;30.0.3"

      - name: 🚀 Compilar APK con Buildozer
        run: |
          export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
          buildozer -v android debug

      - name: 📤 Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: UrbanGo-APK
          path: bin/*.apk
