name: Build APK with Buildozer

on:  
  push:  
    branches: [main]  
  pull_request:  
    branches: [main]  

jobs:  
  build:  
    runs-on: ubuntu-latest  

    steps:  
      - name: 🔹 Clonar el Repositorio  
        uses: actions/checkout@v3  

      - name: 🔹 Configurar Python  
        uses: actions/setup-python@v4  
        with:  
          python-version: "3.10"  

      - name: 🔹 Instalar Dependencias del Sistema  
        run: |  
          sudo apt update && sudo apt install -y zip unzip openjdk-17-jdk  
          pip install --upgrade pip setuptools wheel  

      - name: ✅ Instalar Buildozer y Dependencias  
        run: |  
          pip install buildozer  
          sudo apt install -y liblz4-tool  

      - name: ✅ Aceptar Licencias del Android SDK  
        run: |  
          export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk  
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH  
          yes | sdkmanager --licenses || true  
          sdkmanager "platform-tools" "platforms;android-30" "build-tools;30.0.3"  

      - name: 🚀 Compilar APK con Buildozer  
        run: |  
          buildozer -v android debug  

      - name: 📦 Guardar APK como Artefacto  
        uses: actions/upload-artifact@v4 
        with:  
          name: UrbanGo-APK  
          path: bin/*.apk  

